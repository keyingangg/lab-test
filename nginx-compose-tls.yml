services:
  webapp:
    build:
      context: .
    container_name: webapp
    env_file:
      - .env
    volumes:
      - ./common-passwords.txt:/app/common-passwords.txt

  nginx:
    image: nginx:alpine
    container_name: nginxwebsvr
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-tls.conf:/etc/nginx/conf.d/default.conf
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - webapp

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: sh -c "certbot certonly --webroot -w /var/www/certbot --email your-email@example.com --agree-tos --no-eff-email --rsa-key-size 4096 --expand --force-renewal -d yourdomain.com -d www.yourdomain.com && nginx -s reload"
