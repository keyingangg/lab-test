services:
  webapp:
    build:
      context: .
    container_name: webapp
    env_file:
      - .env
    ports:
      - "5000:5000"
    volumes:
      - ./common-passwords.txt:/app/common-passwords.txt

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - webapp

  selenium:
    image: selenium/standalone-chrome:latest
    container_name: selenium
    shm_size: 2gb
    ports:
      - "4444:4444"
    depends_on:
      - webapp

  gitea:
    image: gitea/gitea:latest
    container_name: gitea
    ports:
      - "3000:3000"  # web UI
      - "222:22"     # SSH access
    volumes:
      - ./gitea:/data
    environment:
      - USER_UID=1000
      - USER_GID=1000

  mysqldb:
    image: mysql:8.0
    container_name: mysqldb
    restart: always
    volumes:
      - ./mysql_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: pass
      MYSQL_DATABASE: testdb
      MYSQL_USER: user
      MYSQL_PASSWORD: pass