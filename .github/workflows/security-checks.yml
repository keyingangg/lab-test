name: Security & Quality Checks

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  combined-checks:
    name: ESLint + Dependency Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install Node.js dependencies
      run: npm ci || npm install

    - name: Run ESLint and generate SARIF report
      run: |
        mkdir -p reports
        npx eslint "app/**/*.js" \
          --format @microsoft/eslint-formatter-sarif \
          --output-file reports/eslint-results.sarif

    - name: Upload ESLint SARIF to GitHub
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: reports/eslint-results.sarif

    - name: Run OWASP Dependency Check
      uses: dependency-check/Dependency-Check_Action@main
      with:
        project: "MySecureWebApp"
        path: "."
        format: "HTML"
        out: "dependency-check-report"
      # NVD now rate-limits anonymous requests heavily (scans can take
      # 30+ min or fail without a key). Request a free key at
      # https://nvd.nist.gov/developers/request-an-api-key and store it as
      # a repository secret named NVD_API_KEY.
      env:
        NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

    - name: Upload Dependency Check Report
      uses: actions/upload-artifact@v4
      with:
        name: Dependency-Check-Report
        path: dependency-check-report
        
        